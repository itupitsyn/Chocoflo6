name: Deploy to stage
on:
  workflow_dispatch:
  push:
    branches:
      - stage
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Save Image (Compressed)
        run: |
          docker build -t asya-sweets-stage .
          # Сжимаем образ "на лету" для уменьшения размера файла
          docker save asya-sweets-stage | gzip > asya-sweets-stage.tar.gz

      - name: Copy image to VDS
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: 52
          source: "asya-sweets-stage.tar.gz"
          target: "/tmp"

      - name: Load and Restart with Bun
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: 52
          script: |
            # Распаковываем и загружаем образ
            zcat /tmp/asya-sweets-stage.tar.gz | docker load
            
            # Удаляем старый контейнер
            docker stop asya-sweets-stage || true
            docker rm asya-sweets-stage || true
            
            # Запускаем новый
            docker run -d \
              -p 4600:3000 \
              --name asya-sweets-stage \
              --restart always \
              -e BOT_TOKEN=${{ secrets.BOT_TOKEN_STAGE }} \
              -e DATABASE_URL=${{ secrets.DATABASE_URL_STAGE }} \
              -e PATH_TO_FILES=${{ secrets.PATH_TO_FILES_STAGE }} \
              -e ADMIN_ID=${{ secrets.ADMIN_ID_STAGE }} \
              -v /root/apps/asya-sweets-stage-imgs:/images-stage \
              asya-sweets-stage
            
            # Очистка
            rm /tmp/asya-sweets-stage.tar.gz
            docker image prune -f
